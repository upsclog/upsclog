<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">

    <header class="catalog-bar">
      <div class="catalog-mark">
        <a href="gs2_mains.html" class="catalog-mark-num catalog-mark-link">← GS-II</a>
        <span class="catalog-mark-word">One Pagers</span>
      </div>

      <div class="combobox" id="combobox">
        <button type="button" class="combo-trigger" id="comboTrigger" aria-haspopup="listbox" aria-expanded="false">
          <span class="combo-value" id="comboValue">Browse the catalog…</span>
          <svg class="combo-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M2 4.5L7 9.5L12 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <ul class="combo-list" id="comboList" role="listbox" tabindex="-1" hidden aria-label="Documents"></ul>
      </div>

      <div class="catalog-hint">Press a letter to jump</div>
    </header>

    <main class="grid-wrap">
      <div class="bento-grid" id="bentoGrid"></div>
      <div class="fade-overlay" aria-hidden="true"></div>
    </main>

  </div>

  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" role="alertdialog" aria-modal="true" aria-labelledby="modalTitle">
      <p class="modal-eyebrow">Open document</p>
      <h2 class="modal-title" id="modalTitle">—</h2>
      <p class="modal-sub">This will open in a new tab.</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="modalNo">No</button>
        <button type="button" class="btn btn-solid" id="modalYes">Yes, open it</button>
      </div>
    </div>
  </div>

<script src="script.js"></script>
</body>
</html>
