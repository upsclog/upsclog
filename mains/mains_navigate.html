<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Five Papers, One Service — UPSC Mains Compendium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0D12;
    --ink-2:#12151C;
    --card:#12151D;
    --card-border:rgba(233,231,222,0.10);
    --paper:#E9E7DE;
    --paper-dim:#9A9C9C;
    --paper-faint:rgba(233,231,222,0.58);

    --gs1:#B8834A; --gs1-soft:rgba(184,131,74,0.13);
    --gs2:#4B5FBF; --gs2-soft:rgba(75,95,191,0.13);
    --gs3:#4C8558; --gs3-soft:rgba(76,133,88,0.13);
    --gs4:#8A3B4C; --gs4-soft:rgba(138,59,76,0.13);
    --ph: #3E7FA6; --ph-soft: rgba(62,127,166,0.13);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  .grid-veil{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(233,231,222,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(233,231,222,0.03) 1px, transparent 1px);
    background-size:44px 44px;
    mask-image:radial-gradient(ellipse 90% 60% at 50% 0%, black 30%, transparent 80%);
  }

  .wrap{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:0 6vw;}

  .back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin:28px 6vw 0;
    padding:9px 15px;
    border-radius:100px;
    border:1px solid var(--card-border);
    background:var(--ink-2);
    color:var(--paper);
    font-family:'IBM Plex Sans', sans-serif;
    font-weight:500;
    font-size:13px;
    text-decoration:none;
    cursor:pointer;
    transition:border-color .25s, background .25s, transform .15s;
    position:relative; z-index:1;
  }
  .back-btn:hover{ border-color:rgba(233,231,222,0.4); background:#191D27; }
  .back-btn:active{ transform:scale(0.96); }
  .back-btn:focus-visible{ outline:2px solid var(--paper); outline-offset:2px; }
  .back-btn svg{ width:15px; height:15px; flex:0 0 auto; }

  header{
    padding:34px 0 6px;
    max-width:640px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--paper-dim);
    display:flex; align-items:center; gap:10px;
    margin-bottom:20px;
  }
  .eyebrow::before{ content:""; width:22px; height:1px; background:var(--paper-dim); }
  h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:clamp(2.1rem, 5vw, 3.4rem);
    line-height:1.06;
    letter-spacing:-0.01em;
    margin:0 0 16px;
  }
  h1 em{
    font-style:italic;
    font-weight:500;
    color:transparent;
    background:linear-gradient(90deg, var(--gs1), var(--gs2) 30%, var(--gs3) 55%, var(--gs4) 75%, var(--ph));
    -webkit-background-clip:text;
    background-clip:text;
  }
  header p{
    font-size:15.5px;
    line-height:1.6;
    color:var(--paper-faint);
    max-width:480px;
    margin:0;
  }

  /* ===== grid ===== */
  .paper-grid{
    padding:36px 0 70px;
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:14px;
  }

  .paper-card{
    --tint: var(--gs1);
    --tint-soft: var(--gs1-soft);
    display:flex;
    flex-direction:column;
    text-decoration:none;
    color:var(--paper);
    background:var(--card);
    border:1px solid var(--card-border);
    border-left:2px solid var(--tint);
    border-radius:12px;
    padding:22px 22px 20px;
    position:relative;
    transition:transform .2s ease, border-color .2s ease, background .2s ease;
  }
  .paper-card:hover{
    transform:translateY(-3px);
    background:#151924;
    border-color:color-mix(in srgb, var(--tint) 45%, var(--card-border));
    border-left-color:var(--tint);
  }
  .paper-card:focus-visible{ outline:2px solid var(--paper); outline-offset:3px; }
  .paper-card:active{ transform:translateY(-1px); }

  .card-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .code{
    font-family:'IBM Plex Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.13em;
    color:var(--tint);
    background:var(--tint-soft);
    padding:5px 10px;
    border-radius:100px;
  }
  .seal{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:14px;
    color:var(--tint);
    opacity:0.85;
  }

  .paper-card h2{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:20px;
    line-height:1.24;
    margin:0 0 8px;
  }
  .paper-card h2 span{ color:var(--tint); }

  .paper-card p{
    font-size:13.5px;
    line-height:1.55;
    color:var(--paper-faint);
    margin:0 0 18px;
    flex-grow:1;
  }

  .card-bottom{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:13px;
    font-weight:500;
    color:var(--tint);
  }
  .card-bottom svg{ width:14px; height:14px; transition:transform .18s ease; }
  .paper-card:hover .card-bottom svg{ transform:translate(3px,-3px); }

  footer{
    padding:0 6vw 60px;
    color:var(--paper-dim);
    font-size:12.5px;
    position:relative; z-index:1;
  }

  @media (max-width:520px){
    header{ padding-top:22px; }
    .paper-grid{ grid-template-columns:1fr; padding-top:26px; gap:12px; }
    .paper-card{ padding:20px 18px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }
</style>
</head>
<body>

<div class="grid-veil"></div>

<a class="back-btn" href="../index.html" aria-label="Go back">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  UPSC LoG
</a>

<div class="wrap">
  <header>
    <div class="eyebrow">Mains Compendium</div>
    <h1>Mains Monk — <em>choose your paper</em></h1>
    <p>General Studies I–IV, and Physics Optional. One Pagers, PYQs, Current Affairs, Value Additions.</p>
  </header>

  <div class="paper-grid" id="grid"></div>
</div>

<footer class="wrap"></footer>

<script>
const PAPERS = [
  {
    code: "GS — I",
    seal: "I",
    tint: "gs1",
    title: "History, Geography &amp; <span>Indian Society</span>",
    desc: "Harappan trade routes to the freedom movement, monsoon systems to the fault lines of a diverse society.",
    href: "gs1_mains/gs1_mains.html"
  },
  {
    code: "GS — II",
    seal: "II",
    tint: "gs2",
    title: "Polity, Constitution &amp; <span>International Relations</span>",
    desc: "The architecture of the Republic — institutions, charter, federal balance — and India's place among nations.",
    href: "gs2_mains/gs2_mains.html"
  },
  {
    code: "GS — III",
    seal: "III",
    tint: "gs3",
    title: "Economy, Agriculture &amp; <span>Infrastructure</span>",
    desc: "Growth, land, and livelihood — how a nation feeds itself, builds itself, and looks after those it leaves behind.",
    href: "gs3_mains/gs3_mains.html"
  },
  {
    code: "GS — IV",
    seal: "IV",
    tint: "gs4",
    title: "Ethics, Integrity &amp; <span>Aptitude</span>",
    desc: "Where judgment is tested, not just recall — ethical theory, public service values, and case studies.",
    href: "gs4_mains/gs4_mains.html"
  },
  {
    code: "OPTIONAL — I",
    seal: "Φ₁",
    tint: "ph",
    title: "Physics Optional <span>Paper I</span>",
    desc: "Mechanics, waves, electricity &amp; magnetism, and thermal &amp; statistical physics — the classical foundations.",
    href: "physics_paper1/physics_paper1.html"
  },
  {
    code: "OPTIONAL — II",
    seal: "Φ₂",
    tint: "ph",
    title: "Physics Optional <span>Paper II</span>",
    desc: "Quantum mechanics, atomic &amp; nuclear physics, solid state physics, and electronics — the modern edifice.",
    href: "physics_paper2/physics_paper2.html"
  }
];

const grid = document.getElementById('grid');
PAPERS.forEach(p => {
  const a = document.createElement('a');
  a.className = 'paper-card';
  a.href = p.href;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.style.setProperty('--tint', `var(--${p.tint})`);
  a.style.setProperty('--tint-soft', `var(--${p.tint}-soft)`);
  a.innerHTML = `
    <div class="card-top">
      <span class="code">${p.code}</span>
      <span class="seal">${p.seal}</span>
    </div>
    <h2>${p.title}</h2>
    <p>${p.desc}</p>
    <div class="card-bottom">
      Open
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7M7 7h10v10"/></svg>
    </div>
  `;
  grid.appendChild(a);
});
</script>

</body>
</html>
